# Permissions
permission = /usr/bin/grim, screencopy, ask
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, ask
permission = power-button, keyboard, allow
permission = semico---usb-gaming-keyboard--1, keyboard, allow
permission = semico---usb-gaming-keyboard--keyboard-1, keyboard, allow
permission = keyd-virtual-keyboard, keyboard, allow

permission = .*, keyboard, deny


# -----------------------------------------------------
# Monitor
# -----------------------------------------------------
source = ~/.config/hypr/conf/monitor.conf

# -----------------------------------------------------
# Cursor
# -----------------------------------------------------
source = ~/.config/hypr/conf/cursor.conf

# -----------------------------------------------------
# Environment
# -----------------------------------------------------
source = ~/.config/hypr/conf/environment.conf

# -----------------------------------------------------
# Keyboard
# -----------------------------------------------------
source = ~/.config/hypr/conf/keyboard.conf

# -----------------------------------------------------
# Load color file
# -----------------------------------------------------
source = ~/.config/hypr/colors.conf

$color8 = $on_primary_fixed

$color11 = $on_surface

# -----------------------------------------------------
# Autostart
# -----------------------------------------------------
source = ~/.config/hypr/conf/autostart.conf

# -----------------------------------------------------
# Load configuration files
# -----------------------------------------------------
source = ~/.config/hypr/conf/window.conf
source = ~/.config/hypr/conf/decoration.conf
source = ~/.config/hypr/conf/layout.conf
source = ~/.config/hypr/conf/workspace.conf
source = ~/.config/hypr/conf/misc.conf
source = ~/.config/hypr/conf/keybinding.conf
source = ~/.config/hypr/conf/windowrule.conf

# -----------------------------------------------------
# Animation
# -----------------------------------------------------
source = ~/.config/hypr/conf/animation.conf

# -----------------------------------------------------
# Environment for xdg-desktop-portal-hyprland
# -----------------------------------------------------
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


# APP SPECIFIC CONFIG SUPPORT
source = ~/.config/hypr/conf/app.conf


source = ~/.config/hypr/hyprplugin.conf




# -----------------------------------------------------
# Custom
# -----------------------------------------------------
source = ~/.config/hypr/conf/custom.conf

windowrule = no_focus on, match:class ^(steam)$, match:title ^(notificationtoasts_.*_desktop)$
windowrule = focus_on_activate on, match:class .*

input {
    follow_mouse = 1
    sensitivity = -0.4999
    accel_profile = adaptive
}
#debug:disable_logs = false

#layout
scrolling {
    fullscreen_on_one_column = true
    column_width = 0.7
    direction = right
}
